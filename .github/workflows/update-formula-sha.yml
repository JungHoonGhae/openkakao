name: Update Homebrew Formula SHA256

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        id: sha
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          EMPTY_SHA="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          if [ -z "$SHA" ] || [ "$SHA" = "$EMPTY_SHA" ]; then
            echo "::error::Failed to download tarball or got empty file"
            exit 1
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA"

      - name: Update Formula/openkakao.rb
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          sed -i \
            -e "s|archive/refs/tags/v[^\"]*\.tar\.gz|archive/refs/tags/${TAG}.tar.gz|" \
            -e "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA}\"|" \
            Formula/openkakao.rb
          echo "Updated formula:"
          cat Formula/openkakao.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/openkakao.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "chore: update Homebrew formula sha256 for v${VERSION}"
          git push origin main
