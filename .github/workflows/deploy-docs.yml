name: Deploy Docs (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            website/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('website/pnpm-lock.yaml') }}-${{ hashFiles('website/app/**/*', 'website/components/**/*', 'website/content/**/*', 'website/lib/**/*', 'website/source.config.ts', 'website/next.config.mjs', 'website/mdx-components.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('website/pnpm-lock.yaml') }}-

      - name: Fetch dependencies
        working-directory: website
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies
        working-directory: website
        run: pnpm install --offline --frozen-lockfile

      - name: Build
        working-directory: website
        run: pnpm build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
