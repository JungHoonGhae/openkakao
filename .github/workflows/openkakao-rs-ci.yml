name: openkakao-rs CI

on:
  push:
    paths:
      - "openkakao-rs/**"
      - ".github/workflows/openkakao-rs-ci.yml"
  pull_request:
    paths:
      - "openkakao-rs/**"
      - ".github/workflows/openkakao-rs-ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo check
        run: cargo check --manifest-path openkakao-rs/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path openkakao-rs/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path openkakao-rs/Cargo.toml -- -D warnings

      - name: Cargo fmt
        run: cargo fmt --manifest-path openkakao-rs/Cargo.toml --check
